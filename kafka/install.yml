---
- name: Install Kafka and add to PATH
  hosts: all
  vars:
    # Download variables
    kafka_version: 4.2.1
    kafka_url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_2.13-{{ kafka_version }}.tgz"
    kafka_archive: "kafka_2.13-{{ kafka_version }}.tgz"
    # Installation path (use in inventory file)
    kafka: /opt/kafka
    kafka_install_dir: "{{ kafka }}/kafka_2.13-{{ kafka_version }}"
    kafka_bin: "{{ kafka_install_dir }}/bin"

  tasks:
    - name: Install dependencies
      become: true
      ansible.builtin.dnf:
        name:
          - java-21-openjdk-devel
          - unzip
          - tar
          - wget
          - rsync
          - net-tools
          - jq
        state: present

    - name: Create Kafka directory
      become: true
      ansible.builtin.file:
        path: "{{ kafka }}"
        state: directory
        mode: "0700"
        owner: vagrant
        group: vagrant

    - name: Check if Kafka is installed
      ansible.builtin.stat:
        path: "{{ kafka_install_dir }}"
      register: kafka_installed

    - name: Download Kafka archive
      ansible.builtin.get_url:
        url: "{{ kafka_url }}"
        dest: "/tmp/{{ kafka_archive }}"
        mode: "0644"
      when: not kafka_installed.stat.exists

    - name: Extract Kafka archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ kafka_archive }}"
        dest: "{{ kafka }}"
        remote_src: true
      when: not kafka_installed.stat.exists

    - name: Add Kafka to PATH
      become: true
      ansible.builtin.copy:
        dest: /etc/profile.d/kafka.sh
        content: |
          export PATH={{ kafka_bin }}:$PATH
        mode: "0755"
