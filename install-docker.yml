---
- name: Install Docker
  hosts: all
  become: true

  tasks:

    - name: Set up Docker's apt repository
      ansible.builtin.script: ./docker.sh

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Ensure docker.service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
