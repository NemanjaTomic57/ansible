---
- name: Copy local SSH keys to VM
  hosts: all

  tasks:
    - name: Copy private key
      ansible.builtin.copy:
        src: ~/.ssh/id_ed25519
        dest: /home/vagrant/.ssh/id_ed25519
        mode: '0600'

    - name: Copy public key
      ansible.builtin.copy:
        src: ~/.ssh/id_ed25519.pub
        dest: /home/vagrant/.ssh/id_ed25519.pub
        mode: '0644'
