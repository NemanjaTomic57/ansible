---
- name: Install npm dependencies
  hosts: all

  tasks:
    - name: Install apt dependencies
      become: true
      ansible.builtin.apt:
        name: npm
        update_cache: true

    - name: Copy workspace folder
      ansible.builtin.copy:
        src: ./workspace
        dest: /home/vagrant
        owner: vagrant
        mode: "0700"

    - name: Install npm dependencies
      community.general.npm:
        path: /home/vagrant/workspace
