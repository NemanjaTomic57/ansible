---
- name: Install AWS Ecosystem Tooling
  hosts: all

  vars:
    aws_cli_zip: "awscliv2.zip"
    aws_cli_url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"

    sam_cli_url: "https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip"

    session_manager_plugin_url: >
      https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb

    terraform_repo: "https://apt.releases.hashicorp.com"
    kubectl_version_url: "https://dl.k8s.io/release/stable.txt"

  tasks:

    #####################################################################
    # BASE PACKAGES
    #####################################################################

    - name: Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required base packages
      become: true
      ansible.builtin.apt:
        name:
          - gpg
          - npm
          - openjdk-25-jdk
        state: present

    #####################################################################
    # AWS CLI v2
    #####################################################################

    - name: Download AWS CLI v2
      ansible.builtin.get_url:
        url: "{{ aws_cli_url }}"
        dest: "/tmp/{{ aws_cli_zip }}"
        mode: '0644'

    - name: Unarchive AWS CLI
      ansible.builtin.unarchive:
        src: "/tmp/{{ aws_cli_zip }}"
        dest: /tmp
        remote_src: true

    - name: Install AWS CLI v2
      become: true
      ansible.builtin.command:
        cmd: /tmp/aws/install --update
      changed_when: true

    #####################################################################
    # AWS SAM CLI
    #####################################################################

    - name: Create SAM installation directory
      ansible.builtin.file:
        path: /tmp/sam-installation
        state: directory
        mode: '0755'

    - name: Download AWS SAM CLI
      ansible.builtin.get_url:
        url: "{{ sam_cli_url }}"
        dest: /tmp/aws-sam-cli-linux-x86_64.zip
        mode: '0644'

    - name: Extract AWS SAM CLI
      ansible.builtin.unarchive:
        src: /tmp/aws-sam-cli-linux-x86_64.zip
        dest: /tmp/sam-installation
        remote_src: true

    - name: Install AWS SAM CLI
      become: true
      ansible.builtin.command:
        cmd: /tmp/sam-installation/install --update
      changed_when: true

    #####################################################################
    # AWS CDK
    #####################################################################

    - name: Install latest AWS CDK
      become: true
      community.general.npm:
        name: aws-cdk
        global: true
        state: latest

    #####################################################################
    # Session Manager Plugin
    #####################################################################

    - name: Download Session Manager Plugin
      ansible.builtin.get_url:
        url: "{{ session_manager_plugin_url }}"
        dest: /tmp/session-manager-plugin.deb
        mode: '0644'

    - name: Install Session Manager Plugin
      become: true
      ansible.builtin.apt:
        deb: /tmp/session-manager-plugin.deb

    #####################################################################
    # kubectl
    #####################################################################

    - name: Get latest kubectl version
      ansible.builtin.uri:
        url: "{{ kubectl_version_url }}"
        return_content: true
      register: kubectl_version

    - name: Download kubectl
      become: true
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    #####################################################################
    # eksctl
    #####################################################################

    - name: Get latest eksctl release info
      ansible.builtin.uri:
        url: https://api.github.com/repos/weaveworks/eksctl/releases/latest
        return_content: true
      register: eksctl_release

    - name: Set eksctl version
      ansible.builtin.set_fact:
        eksctl_version: "{{ eksctl_release.json.tag_name }}"

    - name: Download eksctl
      ansible.builtin.get_url:
        url: "https://github.com/weaveworks/eksctl/releases/download/{{ eksctl_version }}/eksctl_Linux_amd64.tar.gz"
        dest: /tmp/eksctl.tar.gz
        mode: '0644'

    - name: Extract eksctl
      ansible.builtin.unarchive:
        src: /tmp/eksctl.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install eksctl
      become: true
      ansible.builtin.copy:
        src: /tmp/eksctl
        dest: /usr/local/bin/eksctl
        mode: '0755'
        remote_src: true

    #####################################################################
    # HELM
    #####################################################################

    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0755'

    - name: Install Helm
      ansible.builtin.command:
        cmd: /tmp/get_helm.sh
      changed_when: true

    #####################################################################
    # HASHICORP REPOSITORY
    #####################################################################

    - name: Add HashiCorp GPG key
      become: true
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://apt.releases.hashicorp.com/gpg | \
        gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp repository
      become: true
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg]
          https://apt.releases.hashicorp.com
          {{ ansible_facts['distribution_release'] }} main
        filename: hashicorp
        state: present

    - name: Update apt cache after adding HashiCorp repo
      become: true
      ansible.builtin.apt:
        update_cache: true

    #####################################################################
    # TERRAFORM & PACKER
    #####################################################################

    - name: Install Terraform and Packer
      become: true
      ansible.builtin.apt:
        name:
          - terraform
          - packer

    #####################################################################
    # DOCKER SERVICE
    #####################################################################

    - name: Install Docker
      become: true

      block:

        - name: Create keyrings directory
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Download Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.shell: |
            echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/debian \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
            > /etc/apt/sources.list.d/docker.list
          args:
            creates: /etc/apt/sources.list.d/docker.list

        - name: Install Docker packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Create docker group
          ansible.builtin.group:
            name: docker
            state: present

        - name: Add docker group to user
          ansible.builtin.user:
            name: vagrant
            groups: docker
            append: true

        - name: Enable Docker
          ansible.builtin.service:
            name: docker
            enabled: true
            state: started

    #####################################################################
    # VERIFY INSTALLATIONS
    #####################################################################

    - name: Verify installed tools
      ansible.builtin.shell: |
        set -o pipefail
        echo "AWS CLI: $(aws --version)"
        echo "SAM CLI: $(sam --version)"
        echo "CDK: $(cdk --version)"
        echo "kubectl: $(kubectl version --client --output=yaml | head -n 5)"
        echo "eksctl: $(eksctl version)"
        echo "Terraform: $(terraform version | head -n 1)"
        echo "Packer: $(packer version)"
        echo "Helm: $(helm version --short)"
      register: tool_versions
      changed_when: false

    - name: Show installed versions
      ansible.builtin.debug:
        var: tool_versions.stdout_lines
